name: Mimo-Spark-iOS-Build-IPA
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup_Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          
      - name: Recreate_iOS_Folder
        run: |
          rm -rf ios
          flutter create --platforms=ios .

      - name: Get_Deps
        run: |
          flutter config --enable-ios
          flutter pub get

      - name: Build_iOS_IPA
        run: |
          flutter build ios --release --no-codesign
          
          # Create IPA
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r MIMO_SPARK.ipa Payload

      - name: Upload_Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mimo-spark-ipa
          path: build/ios/iphoneos/MIMO_SPARK.ipa
