name: Mimo-Spark-iOS-Build-IPA
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup_Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create_Project_Structure
        run: |
          # Backup custom files
          cp pubspec.yaml pubspec.yaml.bak
          cp -r lib lib.bak
          
          # Force create iOS structure
          flutter create --project-name=mimo_spark --platforms=ios .
          
          # Restore custom files
          cp pubspec.yaml.bak pubspec.yaml
          rm -rf lib
          mv lib.bak lib

      - name: Fetch_NDI_SDK
        run: |
          brew install p7zip
          mkdir -p ios/NDISDK/lib/
          mkdir -p ios/NDISDK/include/
          cd ios
          curl -L "https://github.com/djenadimohamedamine-code/MIMO_IOS/releases/download/v1.0.1-stable/libndi_ios.zip" -o "libndi_ios.zip"
          curl -L "https://github.com/djenadimohamedamine-code/MIMO_IOS/releases/download/v1.0.1-stable/include.7z" -o "include.7z"
          unzip -o libndi_ios.zip -d temp_lib
          find temp_lib -name "*.a" -exec cp {} NDISDK/lib/libndi_ios.a \;
          7z x include.7z -oNDISDK/include/ -y
          
      - name: Get_Deps
        run: |
          flutter config --enable-ios
          flutter pub get

      - name: Xcode_Config
        run: |
          sudo gem install xcodeproj
          cd ios
          ruby configure_xcode.rb

      - name: Pods
        run: |
          cd ios
          pod install --repo-update

      - name: Build_iOS_IPA
        run: |
          flutter build ios --release --no-codesign --verbose
          # Create IPA
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r MIMO_SPARK.ipa Payload

      - name: Upload_Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mimo-spark-ipa
          path: build/ios/iphoneos/MIMO_SPARK.ipa
